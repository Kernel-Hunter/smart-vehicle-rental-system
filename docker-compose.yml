version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: svrms-db
    environment:
      MYSQL_DATABASE: "svrms"
      MYSQL_USER: "svrms_user"
      MYSQL_PASSWORD: "svrms_password"
      MYSQL_ROOT_PASSWORD: "root_password"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: svrms-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/svrms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "svrms_user"
      SPRING_DATASOURCE_PASSWORD: "svrms_password"
      JWT_SECRET: "change_this_secret"
      JWT_EXPIRATION: "3600000"
    ports:
      - "8080:8080"

volumes:
  db_data:
